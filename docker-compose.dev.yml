version: "3.9"

services:
  postgres:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    environment:
      POSTGRES_DB: finance
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d finance"]
      interval: 5s
      timeout: 5s
      retries: 10

  ollama:
    image: ollama/ollama
    restart: unless-stopped

    volumes:
      - ollama_data:/root/.ollama

    ports:
      - "11434:11434"

  api:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/finance
      FRONTEND_URL: https://financial-intelligence-system-rosy.vercel.app
      OLLAMA_URL: http://ollama:11434/api/generate
      OLLAMA_MODEL: qwen2.5:7b
    depends_on:
      postgres:
        condition: service_healthy
      ollama:
        condition: service_started
    command:
      [
        "uvicorn",
        "app.main:app",
        "--host",
        "0.0.0.0",
        "--port",
        "8000"
      ]

volumes:
  postgres_data:
  ollama_data: